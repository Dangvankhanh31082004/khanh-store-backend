<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Admin KHÁNH STORE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="assets/admin-style.css">
</head>
<body>
<div class="wrapper">
    <!-- Sidebar -->
    <nav class="sidebar" id="sidebar">
        <div class="sidebar-header text-center">ADMIN PANEL</div>
        <ul>
            <li><a href="index.html" class="active"><i class="bi bi-grid-1x2-fill"></i> Dashboard</a></li>
            <li><a href="orders.html"><i class="bi bi-cart-check-fill"></i> Đơn hàng</a></li>
            <li><a href="products.html"><i class="bi bi-box-seam-fill"></i> Sản phẩm</a></li>
            <li><a href="categories.html"><i class="bi bi-tags-fill"></i> Danh mục</a></li>
            <li><a href="customers.html"><i class="bi bi-people-fill"></i> Khách hàng</a></li>
            <li><a href="staff.html"><i class="bi bi-person-badge-fill"></i> Nhân sự</a></li>
            <li><a href="stores.html"><i class="bi bi-shop"></i> Chi nhánh</a></li>
            <li><a href="../index.html" class="text-danger mt-3 d-block"><i class="bi bi-box-arrow-left"></i> Thoát Admin</a></li>
        </ul>
    </nav>

    <!-- Content -->
    <div class="content">
        <div class="top-navbar">
            <button class="btn btn-light d-md-none me-2" id="sidebar-toggle"><i class="bi bi-list fs-4"></i></button>
            <h5 class="mb-0 fw-bold">Tổng quan hệ thống</h5>
            <div class="d-flex align-items-center gap-2">
                <span class="fw-medium d-none d-md-block" id="admin-name-header">Admin</span>
                <div class="bg-primary text-white rounded-circle d-flex align-items-center justify-content-center fw-bold" id="admin-avatar-header" style="width:40px;height:40px">A</div>
            </div>
        </div>

        <div class="main-content">
            <!-- Thẻ thống kê -->
            <div class="row g-4 mb-4">
                <div class="col-6 col-md-3">
                    <div class="stat-card">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <p class="text-muted mb-1">Tổng doanh thu</p>
                                <h3 class="fw-bold" id="stat-revenue"><div class="spinner-border spinner-border-sm text-secondary"></div></h3>
                            </div>
                            <div class="icon-box bg-success text-white"><i class="bi bi-currency-dollar"></i></div>
                        </div>
                    </div>
                </div>
                <div class="col-6 col-md-3">
                    <div class="stat-card">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <p class="text-muted mb-1">Tổng đơn hàng</p>
                                <h3 class="fw-bold" id="stat-orders"><div class="spinner-border spinner-border-sm text-secondary"></div></h3>
                            </div>
                            <div class="icon-box bg-primary text-white"><i class="bi bi-cart-fill"></i></div>
                        </div>
                    </div>
                </div>
                <div class="col-6 col-md-3">
                    <div class="stat-card">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <p class="text-muted mb-1">Sản phẩm</p>
                                <h3 class="fw-bold" id="stat-products"><div class="spinner-border spinner-border-sm text-secondary"></div></h3>
                            </div>
                            <div class="icon-box bg-warning text-dark"><i class="bi bi-box-seam"></i></div>
                        </div>
                    </div>
                </div>
                <div class="col-6 col-md-3">
                    <div class="stat-card">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <p class="text-muted mb-1">Khách hàng</p>
                                <h3 class="fw-bold" id="stat-customers"><div class="spinner-border spinner-border-sm text-secondary"></div></h3>
                            </div>
                            <div class="icon-box bg-info text-white"><i class="bi bi-people"></i></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Đơn hàng chờ xử lý -->
            <div class="table-wrapper">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h5 class="fw-bold mb-0">Đơn hàng đang chờ xử lý</h5>
                    <a href="orders.html" class="btn btn-sm btn-outline-dark rounded-pill px-3">Xem tất cả</a>
                </div>
                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead class="table-light">
                            <tr><th>Mã Đơn</th><th>Ngày đặt</th><th>Địa chỉ</th><th>Tổng tiền</th><th>Action</th></tr>
                        </thead>
                        <tbody id="pending-orders-tbody">
                            <tr><td colspan="5" class="text-center py-3"><div class="spinner-border spinner-border-sm text-primary"></div></td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../assets/api.js"></script>
<script src="../assets/main.js"></script>
<script src="assets/admin-main.js"></script>
<script>
    async function loadDashboard() {
        try {
            // Tải thống kê
            const statsRes = await api.get('/dashboard/stats');
            const stats = statsRes.data;

            document.getElementById('stat-revenue').textContent = formatPrice(stats.total_revenue || 0);
            document.getElementById('stat-orders').textContent = stats.total_orders || 0;
            document.getElementById('stat-products').textContent = stats.total_products || 0;
            document.getElementById('stat-customers').textContent = stats.total_customers || 0;
        } catch (e) {
            console.error('Lỗi tải thống kê:', e);
            document.getElementById('stat-revenue').textContent = '---';
            document.getElementById('stat-orders').textContent = '---';
            document.getElementById('stat-products').textContent = '---';
            document.getElementById('stat-customers').textContent = '---';
        }

        // Tải đơn hàng chờ xử lý
        try {
            const res = await api.get('/orders/admin/all?status=PENDING&limit=5&page=1');
            const tbody = document.getElementById('pending-orders-tbody');
            if (!res.data || res.data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="text-center text-muted py-3">Không có đơn hàng nào đang chờ xử lý.</td></tr>';
                return;
            }
            tbody.innerHTML = '';
            res.data.forEach(o => {
                const date = new Date(o.order_date).toLocaleDateString('vi-VN');
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="fw-bold">#${String(o.id).padStart(6,'0')}</td>
                    <td>${date}</td>
                    <td class="text-truncate" style="max-width:180px">${o.shipping_address || '---'}</td>
                    <td>${formatPrice(o.total_amount)}</td>
                    <td><a href="orders.html" class="btn btn-sm btn-dark">Xử lý</a></td>`;
                tbody.appendChild(tr);
            });
        } catch(e) {
            document.getElementById('pending-orders-tbody').innerHTML = '<tr><td colspan="5" class="text-center text-muted">Lỗi tải đơn hàng.</td></tr>';
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        adminInit(); // Khởi tạo sidebar và kiểm tra quyền admin
        loadDashboard();
    });
</script>
</body>
</html>
