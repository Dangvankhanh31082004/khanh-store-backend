<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Khách hàng - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/admin-style.css">
</head>
<body>
<div class="wrapper">
    <nav class="sidebar" id="sidebar">
        <div class="sidebar-header text-center">ADMIN PANEL</div>
        <ul>
            <li><a href="index.html"><i class="bi bi-grid-1x2-fill"></i> Dashboard</a></li>
            <li><a href="orders.html"><i class="bi bi-cart-check-fill"></i> Đơn hàng</a></li>
            <li><a href="products.html"><i class="bi bi-box-seam-fill"></i> Sản phẩm</a></li>
            <li><a href="categories.html"><i class="bi bi-tags-fill"></i> Danh mục</a></li>
            <li><a href="customers.html" class="active"><i class="bi bi-people-fill"></i> Khách hàng</a></li>
            <li><a href="staff.html"><i class="bi bi-person-badge-fill"></i> Nhân sự</a></li>
            <li><a href="stores.html"><i class="bi bi-shop"></i> Chi nhánh</a></li>
            <li><a href="../index.html" class="text-danger mt-3 d-block"><i class="bi bi-box-arrow-left"></i> Thoát Admin</a></li>
        </ul>
    </nav>

    <div class="content">
        <div class="top-navbar">
            <button class="btn btn-light d-md-none me-2" id="sidebar-toggle"><i class="bi bi-list fs-4"></i></button>
            <h5 class="mb-0 fw-bold">Quản lý Khách hàng</h5>
            <div class="d-flex align-items-center gap-2">
                <span class="fw-medium d-none d-md-block" id="admin-name-header">Admin</span>
                <div class="bg-primary text-white rounded-circle d-flex align-items-center justify-content-center fw-bold" id="admin-avatar-header" style="width:40px;height:40px">A</div>
            </div>
        </div>

        <div class="main-content">
            <div class="d-flex mb-4">
                <input type="text" id="search-customers" class="form-control rounded-pill" placeholder="🔍 Tìm khách hàng (tên, email)..." style="max-width:320px">
            </div>

            <div class="table-wrapper">
                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead class="table-light">
                            <tr><th>ID</th><th>Họ và tên</th><th>Email</th><th>Số điện thoại</th><th>Ngày đăng ký</th><th>Trạng thái</th></tr>
                        </thead>
                        <tbody id="customers-tbody">
                            <tr><td colspan="6" class="text-center py-4"><div class="spinner-border text-primary"></div></td></tr>
                        </tbody>
                    </table>
                </div>
                <nav id="customers-pagination"></nav>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../assets/api.js"></script>
<script src="../assets/main.js"></script>
<script src="assets/admin-main.js"></script>
<script>
    let searchTimeout;
    let currentPage = 1;

    async function loadCustomers(page = 1) {
        currentPage = page;
        const search = document.getElementById('search-customers').value;
        let url = `/customers?page=${page}&limit=15`;
        if (search) url += `&search=${encodeURIComponent(search)}`;

        const tbody = document.getElementById('customers-tbody');
        tbody.innerHTML = '<tr><td colspan="6" class="text-center py-4"><div class="spinner-border text-primary"></div></td></tr>';

        try {
            const res = await api.get(url);
            tbody.innerHTML = '';
            if (!res.data.length) {
                tbody.innerHTML = '<tr><td colspan="6" class="text-center py-4 text-muted">Không có khách hàng nào.</td></tr>';
                return;
            }
            res.data.forEach(c => {
                const date = new Date(c.created_at).toLocaleDateString('vi-VN');
                const avatar = (c.full_name || c.username || '?')[0].toUpperCase();
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>#${c.id}</td>
                    <td>
                        <div class="d-flex align-items-center gap-2">
                            <div class="bg-primary text-white rounded-circle d-flex align-items-center justify-content-center fw-bold" style="width:32px;height:32px;font-size:.8rem">${avatar}</div>
                            <span class="fw-semibold">${c.full_name || c.username}</span>
                        </div>
                    </td>
                    <td>${c.email}</td>
                    <td>${c.phone || '---'}</td>
                    <td>${date}</td>
                    <td><span class="badge bg-success">Hoạt động</span></td>`;
                tbody.appendChild(tr);
            });

            renderPagination(res.pagination, document.getElementById('customers-pagination'), loadCustomers);
        } catch(e) {
            tbody.innerHTML = `<tr><td colspan="6" class="text-center text-danger">${e.message}</td></tr>`;
        }
    }

    function renderPagination({ page, totalPages }, navEl, onPageChange) {
        if (totalPages <= 1) { navEl.innerHTML = ''; return; }
        let html = '<ul class="pagination justify-content-center mt-3">';
        for (let i = 1; i <= totalPages; i++) {
            html += `<li class="page-item ${i === page ? 'active' : ''}"><a class="page-link" href="#" data-page="${i}">${i}</a></li>`;
        }
        html += '</ul>';
        navEl.innerHTML = html;
        navEl.querySelectorAll('a.page-link').forEach(a => {
            a.addEventListener('click', e => { e.preventDefault(); onPageChange(parseInt(e.target.dataset.page)); });
        });
    }

    document.getElementById('search-customers').addEventListener('input', () => {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => loadCustomers(1), 400);
    });

    document.addEventListener('DOMContentLoaded', () => {
        adminInit();
        loadCustomers();
    });
</script>
</body>
</html>
