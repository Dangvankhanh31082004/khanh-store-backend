<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thanh toán - KHÁNH STORE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="assets/style.css">
</head>
<body>
    <div class="container my-5">
        <div class="text-center mb-5">
            <a class="navbar-brand fw-bold text-dark fs-2" href="index.html">KHÁNH<span class="text-primary">STORE</span></a>
            <p class="text-muted mt-2">🔒 Bảo mật & An toàn thanh toán</p>
        </div>

        <!-- Toast thông báo -->
        <div class="position-fixed top-0 end-0 p-3" style="z-index: 9999;">
            <div id="toast-msg" class="toast align-items-center text-bg-success border-0" role="alert">
                <div class="d-flex">
                    <div class="toast-body" id="toast-body">Đặt hàng thành công!</div>
                    <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
                </div>
            </div>
        </div>

        <div class="row g-5">
            <!-- Form thông tin giao hàng -->
            <div class="col-lg-7">
                <h4 class="fw-bold mb-4">Thông tin giao hàng</h4>
                <div class="bg-white p-4 rounded-4 shadow-sm mb-4">
                    <form id="checkout-form">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Họ và tên <span class="text-danger">*</span></label>
                                <input type="text" id="full-name" class="form-control" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Số điện thoại <span class="text-danger">*</span></label>
                                <input type="text" id="phone" class="form-control" required>
                            </div>
                            <div class="col-12">
                                <label class="form-label">Chi nhánh nhận hàng <span class="text-danger">*</span></label>
                                <select id="store-select" class="form-select" required>
                                    <option value="">Đang tải danh sách chi nhánh...</option>
                                </select>
                            </div>
                            <div class="col-12">
                                <label class="form-label">Địa chỉ nhận hàng <span class="text-danger">*</span></label>
                                <input type="text" id="shipping-address" class="form-control" placeholder="Số nhà, đường, phường/xã, quận/huyện, tỉnh/thành phố" required>
                            </div>
                            <div class="col-12">
                                <label class="form-label">Ghi chú (Tùy chọn)</label>
                                <textarea id="notes" class="form-control" rows="2" placeholder="Ghi chú thêm cho đơn hàng..."></textarea>
                            </div>
                        </div>
                    </form>
                </div>

                <h4 class="fw-bold mb-4">Phương thức thanh toán</h4>
                <div class="bg-white p-4 rounded-4 shadow-sm">
                    <div class="form-check mb-3 p-3 border rounded">
                        <input class="form-check-input ms-1" type="radio" name="payment" id="cod" value="cod" checked>
                        <label class="form-check-label fw-bold ms-3" for="cod">Thanh toán khi nhận hàng (COD)</label>
                    </div>
                    <div class="form-check p-3 border rounded bg-light">
                        <input class="form-check-input ms-1" type="radio" name="payment" id="vnpay" value="online" disabled>
                        <label class="form-check-label fw-bold ms-3 text-muted" for="vnpay">Thanh toán Online (VNPay/Momo) <span class="badge bg-secondary">Sắp có</span></label>
                    </div>
                </div>
            </div>

            <!-- Tóm tắt đơn hàng -->
            <div class="col-lg-5">
                <div class="bg-white p-4 rounded-4 shadow-sm border border-primary">
                    <h4 class="fw-bold mb-4">Đơn hàng của bạn</h4>
                    <div id="order-summary-items">
                        <div class="text-center"><div class="spinner-border spinner-border-sm" role="status"></div></div>
                    </div>
                    <hr>
                    <div class="d-flex justify-content-between mb-4 fs-5">
                        <span class="fw-bold">Tổng cộng:</span>
                        <span class="text-danger fw-bold" id="summary-total">---</span>
                    </div>
                    <button id="place-order-btn" class="btn btn-primary-custom w-100 py-3 rounded-pill fs-5 fw-bold" disabled>
                        ĐẶT HÀNG NGAY
                    </button>
                    <p class="text-muted small text-center mt-3"><i class="bi bi-shield-check"></i> Đơn hàng được bảo vệ bởi Khánh Store</p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/api.js"></script>
    <script src="assets/main.js"></script>
    <script src="assets/checkout.js"></script>
</body>
</html>
