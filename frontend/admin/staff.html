<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Nhân sự - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/admin-style.css">
</head>
<body>
<div class="wrapper">
    <nav class="sidebar" id="sidebar">
        <div class="sidebar-header text-center">ADMIN PANEL</div>
        <ul>
            <li><a href="index.html"><i class="bi bi-grid-1x2-fill"></i> Dashboard</a></li>
            <li><a href="orders.html"><i class="bi bi-cart-check-fill"></i> Đơn hàng</a></li>
            <li><a href="products.html"><i class="bi bi-box-seam-fill"></i> Sản phẩm</a></li>
            <li><a href="categories.html"><i class="bi bi-tags-fill"></i> Danh mục</a></li>
            <li><a href="customers.html"><i class="bi bi-people-fill"></i> Khách hàng</a></li>
            <li><a href="staff.html" class="active"><i class="bi bi-person-badge-fill"></i> Nhân sự</a></li>
            <li><a href="stores.html"><i class="bi bi-shop"></i> Chi nhánh</a></li>
            <li><a href="../index.html" class="text-danger mt-3 d-block"><i class="bi bi-box-arrow-left"></i> Thoát Admin</a></li>
        </ul>
    </nav>

    <div class="content">
        <div class="top-navbar">
            <button class="btn btn-light d-md-none me-2" id="sidebar-toggle"><i class="bi bi-list fs-4"></i></button>
            <h5 class="mb-0 fw-bold">Quản lý Nhân sự</h5>
            <div class="d-flex align-items-center gap-2">
                <span class="fw-medium d-none d-md-block" id="admin-name-header">Admin</span>
                <div class="bg-primary text-white rounded-circle d-flex align-items-center justify-content-center fw-bold" id="admin-avatar-header" style="width:40px;height:40px">A</div>
            </div>
        </div>

        <div class="main-content">
            <div class="alert alert-info rounded-3 mb-4">
                <i class="bi bi-info-circle me-2"></i>
                Danh sách tất cả tài khoản có vai trò <strong>admin</strong> và <strong>staff</strong> trong hệ thống.
            </div>

            <div class="table-wrapper">
                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead class="table-light">
                            <tr><th>ID</th><th>Tên</th><th>Email</th><th>Vai trò</th><th>Ngày tạo</th><th>Trạng thái</th></tr>
                        </thead>
                        <tbody id="staff-tbody">
                            <tr><td colspan="6" class="text-center py-4"><div class="spinner-border text-primary"></div></td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../assets/api.js"></script>
<script src="../assets/main.js"></script>
<script src="assets/admin-main.js"></script>
<script>
    const ROLE_BADGE = {
        'admin': '<span class="badge bg-danger">Admin</span>',
        'staff': '<span class="badge bg-warning text-dark">Staff</span>',
        'manager': '<span class="badge bg-info text-dark">Manager</span>',
        'owner': '<span class="badge bg-primary">Owner</span>',
        'customer': '<span class="badge bg-secondary">Customer</span>'
    };

    async function loadStaff() {
        const tbody = document.getElementById('staff-tbody');
        try {
            // Lọc user có role là admin hoặc staff từ API /customers?role=admin|staff
            const res = await api.get('/customers?role=admin&limit=100');
            tbody.innerHTML = '';

            if (!res.data || res.data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="text-center py-4 text-muted">Không có dữ liệu nhân sự.</td></tr>';
                return;
            }

            res.data.forEach(u => {
                const date = new Date(u.created_at).toLocaleDateString('vi-VN');
                const avatar = (u.full_name || u.username || '?')[0].toUpperCase();
                const tr = document.createElement('tr');
                const roleKey = (u.role || '').toLowerCase();
                tr.innerHTML = `
                    <td>#${u.id}</td>
                    <td>
                        <div class="d-flex align-items-center gap-2">
                            <div class="bg-danger text-white rounded-circle d-flex align-items-center justify-content-center fw-bold" style="width:34px;height:34px;font-size:.85rem">${avatar}</div>
                            <span class="fw-semibold">${u.full_name || u.username}</span>
                        </div>
                    </td>
                    <td>${u.email}</td>
                    <td>${ROLE_BADGE[roleKey] || ROLE_BADGE['staff']}</td>
                    <td>${date}</td>
                    <td><span class="badge bg-success">Hoạt động</span></td>`;
                tbody.appendChild(tr);
            });
        } catch(e) {
            tbody.innerHTML = `<tr><td colspan="6" class="text-center text-danger">${e.message}</td></tr>`;
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        adminInit();
        loadStaff();
    });
</script>
</body>
</html>
