<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Danh mục - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/admin-style.css">
</head>
<body>
<div class="wrapper">
    <nav class="sidebar" id="sidebar">
        <div class="sidebar-header text-center">ADMIN PANEL</div>
        <ul>
            <li><a href="index.html"><i class="bi bi-grid-1x2-fill"></i> Dashboard</a></li>
            <li><a href="orders.html"><i class="bi bi-cart-check-fill"></i> Đơn hàng</a></li>
            <li><a href="products.html"><i class="bi bi-box-seam-fill"></i> Sản phẩm</a></li>
            <li><a href="categories.html" class="active"><i class="bi bi-tags-fill"></i> Danh mục</a></li>
            <li><a href="customers.html"><i class="bi bi-people-fill"></i> Khách hàng</a></li>
            <li><a href="staff.html"><i class="bi bi-person-badge-fill"></i> Nhân sự</a></li>
            <li><a href="stores.html"><i class="bi bi-shop"></i> Chi nhánh</a></li>
            <li><a href="../index.html" class="text-danger mt-3 d-block"><i class="bi bi-box-arrow-left"></i> Thoát Admin</a></li>
        </ul>
    </nav>

    <div class="content">
        <div class="top-navbar">
            <button class="btn btn-light d-md-none me-2" id="sidebar-toggle"><i class="bi bi-list fs-4"></i></button>
            <h5 class="mb-0 fw-bold">Quản lý Danh mục</h5>
            <div class="d-flex align-items-center gap-2">
                <span class="fw-medium d-none d-md-block" id="admin-name-header">Admin</span>
                <div class="bg-primary text-white rounded-circle d-flex align-items-center justify-content-center fw-bold" id="admin-avatar-header" style="width:40px;height:40px">A</div>
            </div>
        </div>

        <div class="main-content">
            <div class="d-flex justify-content-end mb-4">
                <button class="btn btn-dark rounded-pill px-4" data-bs-toggle="modal" data-bs-target="#categoryModal" id="add-cat-btn">
                    <i class="bi bi-plus-lg me-2"></i>Thêm danh mục
                </button>
            </div>

            <div class="table-wrapper">
                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead class="table-light">
                            <tr><th>ID</th><th>Tên danh mục</th><th>Mô tả</th><th>Số SP</th><th>Hành động</th></tr>
                        </thead>
                        <tbody id="categories-tbody">
                            <tr><td colspan="5" class="text-center py-4"><div class="spinner-border text-primary"></div></td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Modal Thêm/Sửa danh mục -->
<div class="modal fade" id="categoryModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content rounded-4">
            <div class="modal-header">
                <h5 class="modal-title fw-bold" id="catModalTitle">Thêm danh mục mới</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="cat-id">
                <div class="mb-3">
                    <label class="form-label">Tên danh mục <span class="text-danger">*</span></label>
                    <input type="text" id="cat-name" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Mô tả</label>
                    <textarea id="cat-desc" class="form-control" rows="2"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-outline-secondary rounded-pill px-4" data-bs-dismiss="modal">Hủy</button>
                <button type="button" class="btn btn-dark rounded-pill px-4" id="save-cat-btn">Lưu</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../assets/api.js"></script>
<script src="../assets/main.js"></script>
<script src="assets/admin-main.js"></script>
<script>
    let editingCatId = null;

    async function loadCategories() {
        const tbody = document.getElementById('categories-tbody');
        try {
            const res = await api.get('/categories');
            tbody.innerHTML = '';
            if (!res.data.length) {
                tbody.innerHTML = '<tr><td colspan="5" class="text-center text-muted py-3">Chưa có danh mục nào.</td></tr>';
                return;
            }
            res.data.forEach(cat => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>#${cat.id}</td>
                    <td class="fw-semibold">${cat.name}</td>
                    <td class="text-muted">${cat.description || '---'}</td>
                    <td><span class="badge bg-primary">${cat.product_count ?? 0}</span></td>
                    <td>
                        <button class="btn btn-sm btn-outline-primary me-1 edit-cat-btn" data-id="${cat.id}"><i class="bi bi-pencil"></i></button>
                        <button class="btn btn-sm btn-outline-danger delete-cat-btn" data-id="${cat.id}"><i class="bi bi-trash"></i></button>
                    </td>`;
                tbody.appendChild(tr);
            });
            tbody.querySelectorAll('.edit-cat-btn').forEach(btn => btn.addEventListener('click', () => openEditModal(btn.dataset.id)));
            tbody.querySelectorAll('.delete-cat-btn').forEach(btn => btn.addEventListener('click', () => deleteCategory(btn.dataset.id)));
        } catch(e) {
            tbody.innerHTML = `<tr><td colspan="5" class="text-center text-danger">${e.message}</td></tr>`;
        }
    }

    async function openEditModal(catId) {
        editingCatId = catId;
        document.getElementById('catModalTitle').textContent = 'Chỉnh sửa danh mục';
        try {
            const res = await api.get(`/categories/${catId}`);
            document.getElementById('cat-id').value = catId;
            document.getElementById('cat-name').value = res.data.name;
            document.getElementById('cat-desc').value = res.data.description || '';
        } catch(e) { alert('Lỗi tải danh mục: ' + e.message); return; }
        new bootstrap.Modal(document.getElementById('categoryModal')).show();
    }

    document.getElementById('add-cat-btn').addEventListener('click', () => {
        editingCatId = null;
        document.getElementById('catModalTitle').textContent = 'Thêm danh mục mới';
        document.getElementById('cat-id').value = '';
        document.getElementById('cat-name').value = '';
        document.getElementById('cat-desc').value = '';
    });

    document.getElementById('save-cat-btn').addEventListener('click', async () => {
        const name = document.getElementById('cat-name').value.trim();
        if (!name) { alert('Tên danh mục không được để trống!'); return; }
        const payload = { name, description: document.getElementById('cat-desc').value.trim() };
        try {
            if (editingCatId) {
                await api.put(`/categories/${editingCatId}`, payload);
            } else {
                await api.post('/categories', payload);
            }
            bootstrap.Modal.getInstance(document.getElementById('categoryModal')).hide();
            loadCategories();
        } catch(e) { alert('Lỗi lưu danh mục: ' + e.message); }
    });

    async function deleteCategory(id) {
        if (!confirm('Xóa danh mục này? Các sản phẩm thuộc danh mục sẽ bị ảnh hưởng.')) return;
        try {
            await api.delete(`/categories/${id}`);
            loadCategories();
        } catch(e) { alert('Lỗi xóa: ' + e.message); }
    }

    document.addEventListener('DOMContentLoaded', () => {
        adminInit();
        loadCategories();
    });
</script>
</body>
</html>
