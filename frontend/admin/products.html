<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Sản phẩm - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/admin-style.css">
</head>
<body>
<div class="wrapper">
    <nav class="sidebar" id="sidebar">
        <div class="sidebar-header text-center">ADMIN PANEL</div>
        <ul>
            <li><a href="index.html"><i class="bi bi-grid-1x2-fill"></i> Dashboard</a></li>
            <li><a href="orders.html"><i class="bi bi-cart-check-fill"></i> Đơn hàng</a></li>
            <li><a href="products.html" class="active"><i class="bi bi-box-seam-fill"></i> Sản phẩm</a></li>
            <li><a href="categories.html"><i class="bi bi-tags-fill"></i> Danh mục</a></li>
            <li><a href="customers.html"><i class="bi bi-people-fill"></i> Khách hàng</a></li>
            <li><a href="staff.html"><i class="bi bi-person-badge-fill"></i> Nhân sự</a></li>
            <li><a href="stores.html"><i class="bi bi-shop"></i> Chi nhánh</a></li>
            <li><a href="../index.html" class="text-danger mt-3 d-block"><i class="bi bi-box-arrow-left"></i> Thoát Admin</a></li>
        </ul>
    </nav>

    <div class="content">
        <div class="top-navbar">
            <button class="btn btn-light d-md-none me-2" id="sidebar-toggle"><i class="bi bi-list fs-4"></i></button>
            <h5 class="mb-0 fw-bold">Quản lý Sản phẩm</h5>
            <div class="d-flex align-items-center gap-2">
                <span class="fw-medium d-none d-md-block" id="admin-name-header">Admin</span>
                <div class="bg-primary text-white rounded-circle d-flex align-items-center justify-content-center fw-bold" id="admin-avatar-header" style="width:40px;height:40px">A</div>
            </div>
        </div>

        <div class="main-content">
            <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
                <div class="d-flex gap-2">
                    <input type="text" id="search-products" class="form-control rounded-pill" placeholder="🔍 Tìm sản phẩm..." style="width:220px">
                    <select id="filter-category" class="form-select rounded-pill" style="width:180px">
                        <option value="">Tất cả danh mục</option>
                    </select>
                </div>
                <button class="btn btn-dark rounded-pill px-4" data-bs-toggle="modal" data-bs-target="#productModal" id="add-product-btn">
                    <i class="bi bi-plus-lg me-2"></i>Thêm sản phẩm
                </button>
            </div>

            <div class="table-wrapper">
                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead class="table-light">
                            <tr><th>ID</th><th>Ảnh</th><th>Tên sản phẩm</th><th>Danh mục</th><th>Giá</th><th>Tồn kho</th><th>Hành động</th></tr>
                        </thead>
                        <tbody id="products-tbody">
                            <tr><td colspan="7" class="text-center py-4"><div class="spinner-border text-primary"></div></td></tr>
                        </tbody>
                    </table>
                </div>
                <nav id="products-pagination"></nav>
            </div>
        </div>
    </div>
</div>

<!-- Modal Thêm/Sửa sản phẩm -->
<div class="modal fade" id="productModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content rounded-4">
            <div class="modal-header">
                <h5 class="modal-title fw-bold" id="productModalTitle">Thêm sản phẩm mới</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="product-form">
                    <input type="hidden" id="product-id">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Tên sản phẩm <span class="text-danger">*</span></label>
                            <input type="text" id="p-name" class="form-control" required>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Danh mục <span class="text-danger">*</span></label>
                            <select id="p-category" class="form-select" required></select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Cửa hàng <span class="text-danger">*</span></label>
                            <select id="p-store" class="form-select" required></select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Giá (VNĐ) <span class="text-danger">*</span></label>
                            <input type="number" id="p-price" class="form-control" min="0" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Số lượng tồn kho <span class="text-danger">*</span></label>
                            <input type="number" id="p-stock" class="form-control" min="0" required>
                        </div>
                        <div class="col-12">
                            <label class="form-label">URL Ảnh sản phẩm</label>
                            <input type="text" id="p-image" class="form-control" placeholder="Để trống để dùng ảnh mặc định">
                        </div>
                        <div class="col-12">
                            <label class="form-label">Hoặc chọn ảnh</label>
                            <input type="file" id="p-image-file" class="form-control" accept="image/*">
                        </div>
                        <div class="col-12">
                            <label class="form-label">Mô tả</label>
                            <textarea id="p-desc" class="form-control" rows="3"></textarea>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-outline-secondary rounded-pill px-4" data-bs-dismiss="modal">Hủy</button>
                <button type="button" class="btn btn-dark rounded-pill px-4" id="save-product-btn">Lưu sản phẩm</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../assets/api.js"></script>
<script src="../assets/main.js"></script>
<script src="assets/admin-main.js"></script>
<script src="assets/admin-products.js"></script>
</body>
</html>
