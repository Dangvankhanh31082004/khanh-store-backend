<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết sản phẩm - KHÁNH STORE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="assets/style.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white sticky-top py-3">
        <div class="container">
            <a class="navbar-brand fw-bold text-dark" href="index.html">KHÁNH<span class="text-primary">STORE</span></a>
            <ul class="navbar-nav ms-auto align-items-center">
                <li class="nav-item me-3">
                    <a class="nav-link position-relative" href="cart.html"><i class="bi bi-cart3 fs-5"></i></a>
                </li>
                <li class="nav-item"><a class="nav-link" href="products.html">← Quay lại</a></li>
            </ul>
        </div>
    </nav>

    <!-- Loading State -->
    <div id="loading-state" class="container my-5 text-center py-5">
        <div class="spinner-border text-primary" role="status"></div>
        <p class="mt-3 text-muted">Đang tải sản phẩm...</p>
    </div>

    <!-- Product Detail -->
    <div id="product-detail" class="container my-5" style="display:none">
        <div class="row bg-white p-5 rounded-4 shadow-sm">
            <div class="col-md-6 text-center">
                <img id="product-img" src="" class="img-fluid rounded-4 mb-4" alt="Product" style="max-height:400px; object-fit:contain">
            </div>
            <div class="col-md-6 d-flex flex-column justify-content-center">
                <span class="text-muted text-uppercase small fw-bold" id="product-category"></span>
                <h2 class="fw-bold mt-2" id="product-name"></h2>
                <h3 class="price-tag my-3 fs-2" id="product-price"></h3>
                <p class="text-secondary lh-lg" id="product-description"></p>
                <p id="product-stock" class="small mt-2"></p>

                <div class="d-flex align-items-center mt-4">
                    <div class="input-group me-3 w-25">
                        <button class="btn btn-outline-secondary" type="button" id="qty-minus">-</button>
                        <input type="number" class="form-control text-center fw-bold" id="qty-input" value="1" min="1">
                        <button class="btn btn-outline-secondary" type="button" id="qty-plus">+</button>
                    </div>
                    <button id="add-to-cart-btn" class="btn btn-primary-custom flex-grow-1 py-2 fs-5">
                        <i class="bi bi-cart-plus me-2"></i>Thêm vào giỏ hàng
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Error State -->
    <div id="error-state" class="container my-5 text-center py-5" style="display:none">
        <i class="bi bi-exclamation-triangle-fill text-warning fs-1"></i>
        <h4 class="mt-3">Không tìm thấy sản phẩm</h4>
        <a href="products.html" class="btn btn-dark rounded-pill mt-3 px-4">Xem tất cả sản phẩm</a>
    </div>

    <footer class="footer text-center"><div class="container"><p>&copy; 2026 Khánh Store.</p></div></footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/api.js"></script>
    <script src="assets/main.js"></script>
    <script>
        let productId = null;
        let maxStock = 0;

        async function loadProductDetail() {
            const params = new URLSearchParams(window.location.search);
            productId = params.get('id');

            if (!productId) { showError(); return; }

            try {
                const res = await api.get(`/products/${productId}`);
                const p = res.data;
                maxStock = p.stock_quantity;

                document.title = `${p.name} - KHÁNH STORE`;
                document.getElementById('product-img').src = getProductImageUrl(p.image_url);
                document.getElementById('product-img').alt = p.name;
                document.getElementById('product-name').textContent = p.name;
                document.getElementById('product-price').textContent = formatPrice(p.price);
                document.getElementById('product-description').textContent = p.description || 'Chưa có mô tả chi tiết cho sản phẩm này.';

                const stockEl = document.getElementById('product-stock');
                if (p.stock_quantity > 0) {
                    stockEl.innerHTML = `<i class="bi bi-check-circle text-success"></i> Còn hàng (${p.stock_quantity} sản phẩm)`;
                } else {
                    stockEl.innerHTML = '<i class="bi bi-x-circle text-danger"></i> Hết hàng';
                    document.getElementById('add-to-cart-btn').disabled = true;
                    document.getElementById('add-to-cart-btn').textContent = 'Hết hàng';
                }

                // Tải tên danh mục
                try {
                    const catRes = await api.get(`/categories/${p.category_id}`);
                    document.getElementById('product-category').textContent = catRes.data.name;
                } catch(e) { /* ignore */ }

                document.getElementById('loading-state').style.display = 'none';
                document.getElementById('product-detail').style.display = 'block';
            } catch (e) {
                console.error('Lỗi tải chi tiết sản phẩm:', e);
                showError();
            }
        }

        function showError() {
            document.getElementById('loading-state').style.display = 'none';
            document.getElementById('error-state').style.display = 'block';
        }

        // Điều chỉnh số lượng
        document.getElementById('qty-minus').addEventListener('click', () => {
            const input = document.getElementById('qty-input');
            if (parseInt(input.value) > 1) input.value = parseInt(input.value) - 1;
        });
        document.getElementById('qty-plus').addEventListener('click', () => {
            const input = document.getElementById('qty-input');
            const newVal = parseInt(input.value) + 1;
            if (newVal <= maxStock) input.value = newVal;
            else alert(`Chỉ còn ${maxStock} sản phẩm trong kho!`);
        });

        // Thêm vào giỏ hàng
        document.getElementById('add-to-cart-btn').addEventListener('click', () => {
            const qty = parseInt(document.getElementById('qty-input').value);
            if (qty < 1 || qty > maxStock) {
                alert(`Số lượng không hợp lệ. Tối đa: ${maxStock}`);
                return;
            }
            addToCart(productId, qty);
        });

        document.addEventListener('DOMContentLoaded', () => {
            updateHeaderAuthStatus();
            updateCartBadge();
            loadProductDetail();
        });
    </script>
</body>
</html>
