<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - KHÁNH STORE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/style.css">
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100 bg-light">

    <div class="auth-container d-flex w-100 mx-3">
        <!-- Left Banner -->
        <div class="col-md-5 auth-bg d-none d-md-block"></div>
        
        <!-- Right Form -->
        <div class="col-md-7 p-5">
            <div class="text-center mb-4">
                <a href="index.html" class="text-decoration-none"><h2 class="fw-bold text-dark">KHÁNH<span class="text-primary">STORE</span></h2></a>
                <p class="text-muted">Chào mừng bạn quay trở lại!</p>
            </div>

            <!-- Tabs -->
            <ul class="nav nav-pills nav-justified mb-4" id="authTab" role="tablist">
                <li class="nav-item" role="presentation">
                    <button class="nav-link active fw-bold rounded-pill" data-bs-toggle="pill" data-bs-target="#login">Đăng nhập</button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link fw-bold rounded-pill" data-bs-toggle="pill" data-bs-target="#register">Đăng ký</button>
                </li>
            </ul>

            <div class="tab-content">
                <!-- Tab Login -->
                <div class="tab-pane fade show active" id="login">
                    <form id="loginForm">
                        <div class="mb-3">
                            <label class="form-label fw-medium">Email</label>
                            <input type="email" id="loginEmail" class="form-control form-control-lg bg-light border-0" placeholder="user@example.com" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-medium">Mật khẩu</label>
                            <input type="password" id="loginPassword" class="form-control form-control-lg bg-light border-0" placeholder="••••••••" required>
                        </div>
                        <div class="d-flex justify-content-between mb-4 small">
                            <label><input type="checkbox"> Nhớ mật khẩu</label>
                            <a href="#" class="text-decoration-none text-primary">Quên mật khẩu?</a>
                        </div>
                        <button type="submit" class="btn btn-dark w-100 py-3 rounded-pill fw-bold">Đăng nhập</button>
                    </form>
                </div>

                <!-- Tab Register -->
                <div class="tab-pane fade" id="register">
                    <form id="registerForm">
                        <div class="mb-3">
                            <label class="form-label fw-medium">Họ và tên</label>
                            <input type="text" id="registerName" class="form-control form-control-lg bg-light border-0" placeholder="Nguyễn Văn A" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-medium">Email</label>
                            <input type="email" id="registerEmail" class="form-control form-control-lg bg-light border-0" placeholder="user@example.com" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-medium">Mật khẩu</label>
                            <input type="password" id="registerPassword" class="form-control form-control-lg bg-light border-0" placeholder="••••••••" required>
                        </div>
                        <button type="submit" class="btn btn-primary-custom w-100 py-3 rounded-pill fw-bold mt-2">Tạo tài khoản</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/api.js"></script>
    <script src="assets/main.js"></script>
    <script>
        // XỬ LÝ ĐĂNG NHẬP
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            try {
                const response = await api.post('/auth/login', { email, password });
                
                // Lưu token và user vào localStorage
                localStorage.setItem('token', response.accessToken);
                localStorage.setItem('user', JSON.stringify({
                    id: response.user.id,
                    username: response.user.username,
                    email: response.user.email,
                    name: response.user.full_name || response.user.username,
                    full_name: response.user.full_name || response.user.username,
                    phone: response.user.phone || '',
                    address: response.user.address || '',
                    role: response.user.role
                }));

                alert('Đăng nhập thành công!');
                
                // Phân quyền chuyển hướng
                const role = response.user.role.toUpperCase();
                if (role === 'ADMIN' || role === 'STAFF') {
                    window.location.href = 'admin/index.html';
                } else {
                    window.location.href = 'index.html';
                }
            } catch (error) {
                alert('Đăng nhập thất bại: ' + error.message);
            }
        });

        // XỬ LÝ ĐĂNG KÝ
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const full_name = document.getElementById('registerName').value;
            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;
            // Generate a temporary unique username based on email
            const username = email.split('@')[0] + '-' + Math.round(Math.random() * 1000);

            try {
                await api.post('/auth/register', { username, email, password, full_name });
                alert('Đăng ký thành công! Vui lòng đăng nhập.');
                // Chuyển sang Tab đăng nhập
                const loginTabButton = document.querySelector('#authTab button[data-bs-target="#login"]');
                bootstrap.Tab.getInstance(loginTabButton).show();
            } catch (error) {
                alert('Đăng ký thất bại: ' + error.message);
            }
        });
    </script>
</body>
</html>
