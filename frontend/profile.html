<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hồ sơ cá nhân - KHÁNH STORE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="assets/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg bg-white sticky-top py-3 shadow-sm">
        <div class="container d-flex justify-content-between">
            <a class="navbar-brand fw-bold text-dark" href="index.html">KHÁNH<span class="text-primary">STORE</span></a>
            <a href="index.html" class="btn btn-outline-dark btn-sm rounded-pill px-4">Về trang chủ</a>
        </div>
    </nav>

    <!-- Toast -->
    <div class="position-fixed top-0 end-0 p-3" style="z-index:9999">
        <div id="profile-toast" class="toast align-items-center text-bg-success border-0">
            <div class="d-flex"><div class="toast-body" id="profile-toast-body">Đã lưu!</div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button></div>
        </div>
    </div>

    <div class="container my-5">
        <div class="row g-4">
            <!-- Sidebar -->
            <div class="col-md-3">
                <div class="bg-white rounded-4 shadow-sm p-3">
                    <div class="text-center mb-4 mt-3">
                        <div class="bg-primary text-white rounded-circle d-inline-flex align-items-center justify-content-center fw-bold fs-2" id="user-avatar" style="width:80px;height:80px">?</div>
                        <h5 class="fw-bold mt-2" id="user-name-sidebar"></h5>
                        <small class="text-muted" id="user-email-sidebar"></small>
                    </div>
                    <ul class="list-group list-group-flush">
                        <a href="profile.html" class="list-group-item list-group-item-action active fw-bold border-0 rounded"><i class="bi bi-person me-2"></i> Hồ sơ cá nhân</a>
                        <a href="orders.html" class="list-group-item list-group-item-action border-0"><i class="bi bi-bag me-2"></i> Lịch sử đơn hàng</a>
                        <a href="#" id="logout-btn" class="list-group-item list-group-item-action border-0 text-danger mt-4"><i class="bi bi-box-arrow-right me-2"></i> Đăng xuất</a>
                    </ul>
                </div>
            </div>

            <!-- Content -->
            <div class="col-md-9">
                <div class="bg-white rounded-4 shadow-sm p-4">
                    <h4 class="fw-bold mb-4">Cập nhật hồ sơ</h4>

                    <div id="loading-profile" class="text-center py-3"><div class="spinner-border text-primary"></div></div>
                    <form id="profile-form" style="display:none">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label text-muted">Họ và tên</label>
                                <input type="text" id="full-name" class="form-control bg-light border-0">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-muted">Email (Không thể đổi)</label>
                                <input type="email" id="email" class="form-control bg-light border-0" disabled>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-muted">Số điện thoại</label>
                                <input type="text" id="phone" class="form-control bg-light border-0">
                            </div>
                            <div class="col-12">
                                <label class="form-label text-muted">Địa chỉ mặc định</label>
                                <input type="text" id="address" class="form-control bg-light border-0" placeholder="Số nhà, đường, quận, thành phố">
                            </div>

                            <div class="col-12 mt-2">
                                <hr>
                                <h6 class="fw-bold text-muted">Đổi mật khẩu (bỏ trống nếu không đổi)</h6>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-muted">Mật khẩu mới</label>
                                <input type="password" id="new-password" class="form-control bg-light border-0" placeholder="Ít nhất 6 ký tự">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-muted">Xác nhận mật khẩu</label>
                                <input type="password" id="confirm-password" class="form-control bg-light border-0">
                            </div>

                            <div class="col-12 mt-4">
                                <button type="submit" class="btn btn-dark px-4 rounded-pill">
                                    <i class="bi bi-check-lg me-2"></i>Lưu thay đổi
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/api.js"></script>
    <script src="assets/main.js"></script>
    <script>
        function showToast(msg, type = 'success') {
            const toastEl = document.getElementById('profile-toast');
            const toastBody = document.getElementById('profile-toast-body');
            toastBody.textContent = msg;
            toastEl.className = `toast align-items-center text-bg-${type} border-0`;
            new bootstrap.Toast(toastEl, { delay: 3000 }).show();
        }

        async function loadProfile() {
            try {
                const res = await api.get('/auth/me');
                const user = res.data;

                // Cập nhật localStorage để thống nhất state
                localStorage.setItem('user', JSON.stringify(user));

                const avatar = (user.full_name || user.username || '?')[0].toUpperCase();
                document.getElementById('user-avatar').textContent = avatar;
                document.getElementById('user-name-sidebar').textContent = user.full_name || user.username;
                document.getElementById('user-email-sidebar').textContent = user.email;

                document.getElementById('full-name').value = user.full_name || '';
                document.getElementById('email').value = user.email || '';
                document.getElementById('phone').value = user.phone || '';
                document.getElementById('address').value = user.address || '';

                document.getElementById('loading-profile').style.display = 'none';
                document.getElementById('profile-form').style.display = 'block';
            } catch (e) {
                showToast('Lỗi tải thông tin hồ sơ: ' + e.message, 'danger');
            }
        }

        document.getElementById('profile-form').addEventListener('submit', async e => {
            e.preventDefault();
            const newPass = document.getElementById('new-password').value;
            const confirmPass = document.getElementById('confirm-password').value;

            if (newPass && newPass !== confirmPass) {
                showToast('Mật khẩu xác nhận không khớp!', 'danger');
                return;
            }
            if (newPass && newPass.length < 6) {
                showToast('Mật khẩu mới phải có ít nhất 6 ký tự!', 'danger');
                return;
            }

            const payload = {
                full_name: document.getElementById('full-name').value.trim(),
                phone: document.getElementById('phone').value.trim(),
                address: document.getElementById('address').value.trim()
            };
            if (newPass) payload.password = newPass;

            try {
                await api.put('/auth/profile', payload);
                showToast('Cập nhật hồ sơ thành công!');
                document.getElementById('new-password').value = '';
                document.getElementById('confirm-password').value = '';
                loadProfile(); // Tải lại để đồng bộ dữ liệu
            } catch (e) {
                showToast('Lỗi cập nhật: ' + e.message, 'danger');
            }
        });

        document.getElementById('logout-btn').addEventListener('click', e => {
            e.preventDefault();
            logout();
        });

        document.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('token');
            if (!token) { window.location.href = 'auth.html'; return; }
            loadProfile();
        });
    </script>
</body>
</html>
