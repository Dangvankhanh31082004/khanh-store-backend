<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sản phẩm - KHÁNH STORE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="assets/style.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white sticky-top py-3">
        <div class="container">
            <a class="navbar-brand fw-bold text-dark" href="index.html">KHÁNH<span class="text-primary">STORE</span></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto ms-4">
                    <li class="nav-item"><a class="nav-link" href="index.html">Trang chủ</a></li>
                    <li class="nav-item"><a class="nav-link active" href="products.html">Sản phẩm</a></li>
                </ul>
                <ul class="navbar-nav align-items-center">
                    <li class="nav-item me-3"><a class="nav-link position-relative" href="cart.html"><i class="bi bi-cart3 fs-5"></i></a></li>
                    <li class="nav-item"><a class="btn btn-outline-dark btn-sm rounded-pill px-4" href="auth.html">Đăng nhập</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <div class="row">
            <!-- Sidebar Lọc -->
            <div class="col-md-3 mb-4">
                <div class="card border-0 shadow-sm rounded-4 p-3">
                    <h5 class="fw-bold mb-3">Danh mục</h5>
                    <ul class="list-unstyled" id="category-list">
                        <li class="mb-2">
                            <a href="#" class="text-decoration-none text-dark fw-medium category-link active" data-id="">Tất cả</a>
                        </li>
                    </ul>
                    
                    <h5 class="fw-bold mt-4 mb-3">Lọc theo giá</h5>
                    <div class="mb-2">
                        <label class="form-label small text-muted">Giá tối thiểu</label>
                        <input type="number" id="minPrice" class="form-control form-control-sm" placeholder="0">
                    </div>
                    <div class="mb-3">
                        <label class="form-label small text-muted">Giá tối đa</label>
                        <input type="number" id="maxPrice" class="form-control form-control-sm" placeholder="200.000.000">
                    </div>
                    <button id="applyFilter" class="btn btn-dark w-100 rounded-pill">Áp dụng</button>
                    <button id="clearFilter" class="btn btn-outline-secondary w-100 rounded-pill mt-2">Xóa bộ lọc</button>
                </div>
            </div>

            <!-- Danh sách sản phẩm -->
            <div class="col-md-9">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div>
                        <h4 class="fw-bold mb-0" id="product-heading">Tất cả sản phẩm</h4>
                        <small class="text-muted" id="product-count"></small>
                    </div>
                    <div class="d-flex gap-2">
                        <input type="text" id="searchInput" class="form-control form-control-sm rounded-pill" placeholder="🔍 Tìm sản phẩm...">
                        <select id="sortSelect" class="form-select form-select-sm rounded-pill" style="width:auto">
                            <option value="">Mới nhất</option>
                        </select>
                    </div>
                </div>

                <div class="row g-4" id="products-container">
                    <div class="text-center py-5"><div class="spinner-border text-primary" role="status"></div></div>
                </div>

                <!-- Phân trang -->
                <nav class="mt-5" id="pagination-container"></nav>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer text-center"><div class="container"><p>&copy; 2026 Khánh Store.</p></div></footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/api.js"></script>
    <script src="assets/main.js"></script>
    <script src="assets/products.js"></script>
</body>
</html>
