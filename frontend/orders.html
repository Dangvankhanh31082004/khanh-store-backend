<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lịch sử mua hàng - KHÁNH STORE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="assets/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg bg-white sticky-top py-3 shadow-sm">
        <div class="container d-flex justify-content-between">
            <a class="navbar-brand fw-bold text-dark" href="index.html">KHÁNH<span class="text-primary">STORE</span></a>
            <a href="index.html" class="btn btn-outline-dark btn-sm rounded-pill px-4">Về trang chủ</a>
        </div>
    </nav>

    <!-- Modal xem chi tiết đơn hàng -->
    <div class="modal fade" id="orderDetailModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content rounded-4">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold">Chi tiết đơn hàng</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="orderDetailBody"></div>
                <div class="modal-footer" id="orderDetailFooter"></div>
            </div>
        </div>
    </div>

    <div class="container my-5">
        <div class="row g-4">
            <!-- Sidebar -->
            <div class="col-md-3">
                <div class="bg-white rounded-4 shadow-sm p-3">
                    <div class="text-center mb-4 mt-3">
                        <div class="bg-primary text-white rounded-circle d-inline-flex align-items-center justify-content-center fw-bold" style="width:80px;height:80px;font-size:2rem" id="user-avatar">?</div>
                        <h5 class="fw-bold mt-2" id="user-name-sidebar">Khách hàng</h5>
                    </div>
                    <ul class="list-group list-group-flush">
                        <a href="profile.html" class="list-group-item list-group-item-action border-0"><i class="bi bi-person me-2"></i> Hồ sơ cá nhân</a>
                        <a href="orders.html" class="list-group-item list-group-item-action active fw-bold border-0 rounded"><i class="bi bi-bag me-2"></i> Lịch sử đơn hàng</a>
                        <a href="#" id="logout-btn" class="list-group-item list-group-item-action border-0 text-danger mt-4"><i class="bi bi-box-arrow-right me-2"></i> Đăng xuất</a>
                    </ul>
                </div>
            </div>

            <!-- Nội dung -->
            <div class="col-md-9">
                <div class="bg-white rounded-4 shadow-sm p-4">
                    <h4 class="fw-bold mb-4">Lịch sử Đơn hàng</h4>

                    <div id="loading-orders" class="text-center py-4">
                        <div class="spinner-border text-primary"></div>
                    </div>

                    <div id="empty-orders" class="text-center py-4" style="display:none">
                        <i class="bi bi-inbox fs-1 text-muted"></i>
                        <p class="mt-2 text-muted">Bạn chưa có đơn hàng nào.</p>
                        <a href="products.html" class="btn btn-dark rounded-pill px-4">Mua sắm ngay</a>
                    </div>

                    <div class="table-responsive" id="orders-table-container" style="display:none">
                        <table class="table table-hover align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>Mã Đơn</th>
                                    <th>Ngày đặt</th>
                                    <th>Tổng tiền</th>
                                    <th>Thanh toán</th>
                                    <th>Trạng thái</th>
                                    <th>Hành động</th>
                                </tr>
                            </thead>
                            <tbody id="orders-tbody"></tbody>
                        </table>
                    </div>

                    <!-- Phân trang -->
                    <nav id="orders-pagination"></nav>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/api.js"></script>
    <script src="assets/main.js"></script>
    <script src="assets/orders.js"></script>
</body>
</html>
